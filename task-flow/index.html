<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>Focus Board</h1>
        <p class="subtitle">Планируй задачи и отслеживай прогресс</p>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Введите новую задачу">
            <button id="addBtn">Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <div id="taskList" class="task-list"></div>

        <div class="stats">
            <p id="taskCounter" class="task-counter">Всего задач: 0</p>
            <p id="activeCounter" class="task-counter">Активных задач: 0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
